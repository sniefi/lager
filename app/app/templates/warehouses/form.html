{% extends 'base.html' %}
{% block title %}Mitarbeiterlager anlegen – Lagerverwaltung{% endblock %}
{% block content %}
<div class="row">
    <div class="col-12 col-md-6">
        <h2 class="mb-3">Mitarbeiterlager anlegen</h2>
        <form method="post">
            <div class="mb-4">
                <label for="name" class="form-label">Name *</label>
                <input type="text" class="form-control form-control-lg"
                       id="name" name="name"
                       placeholder="z.B. Max Mustermann" required autofocus>
                <div class="form-text">Wird als Lagerbezeichnung in Buchungen verwendet.</div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success btn-lg flex-grow-1">Speichern</button>
                <a href="{{ url_for('warehouses.list') }}" class="btn btn-outline-secondary btn-lg">Abbrechen</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
