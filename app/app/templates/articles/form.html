{% extends 'base.html' %}
{% block title %}Artikel anlegen – Lagerverwaltung{% endblock %}
{% block content %}
<div class="row">
    <div class="col-12 col-md-6">
        <h2 class="mb-3">Artikel anlegen</h2>
        <form method="post">
            <div class="mb-3">
                <label for="article_id" class="form-label">Artikelcode *</label>
                <input type="text" class="form-control form-control-lg"
                       id="article_id" name="article_id"
                       placeholder="z.B. OEL-001" required autofocus>
                <div class="form-text">Eindeutiger Code, wird in Buchungsmasken verwendet.</div>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">Bezeichnung *</label>
                <input type="text" class="form-control form-control-lg"
                       id="name" name="name"
                       placeholder="z.B. Motoröl 5W-30" required>
            </div>
            <div class="mb-4">
                <label for="unit" class="form-label">Einheit</label>
                <input type="text" class="form-control form-control-lg"
                       id="unit" name="unit"
                       value="Liter" placeholder="Liter">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success btn-lg flex-grow-1">Speichern</button>
                <a href="{{ url_for('articles.list') }}" class="btn btn-outline-secondary btn-lg">Abbrechen</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
