{% extends 'base.html' %}
{% block title %}Einkauf / Einlagerung – Lagerverwaltung{% endblock %}
{% block content %}
<div class="row">
    <div class="col-12 col-md-6">
        <h2 class="mb-1">Einkauf / Einlagerung</h2>
        <p class="text-muted mb-3">Ware wird ins Hauptlager eingebucht.</p>

        <form method="post" id="incoming-form">
            <!-- Artikel-Suche -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Artikel *</label>
                <div class="position-relative">
                    <input type="text"
                           class="form-control form-control-lg"
                           id="article_search"
                           name="q"
                           autocomplete="off"
                           placeholder="Artikelcode oder Name eingeben…"
                           hx-get="{{ url_for('bookings.article_search') }}"
                           hx-trigger="input changed delay:200ms"
                           hx-target="#article-results">
                    <input type="hidden" id="article_code" name="article_code">
                    <div id="article-results" class="position-absolute w-100" style="z-index:9999;top:100%;"></div>
                </div>
                <div class="form-text">Mindestens 1 Zeichen eingeben – Code oder Name</div>
            </div>

            <div class="mb-3">
                <label for="quantity" class="form-label fw-semibold">Menge *</label>
                <input type="number"
                       class="form-control form-control-lg"
                       id="quantity"
                       name="quantity"
                       min="0.01"
                       step="0.01"
                       inputmode="decimal"
                       placeholder="0.00"
                       required>
            </div>

            <div class="mb-4">
                <label for="purchase_price" class="form-label fw-semibold">Einkaufspreis <span class="text-muted fw-normal">(optional)</span></label>
                <div class="input-group input-group-lg">
                    <span class="input-group-text">€</span>
                    <input type="number"
                           class="form-control"
                           id="purchase_price"
                           name="purchase_price"
                           min="0"
                           step="0.01"
                           inputmode="decimal"
                           placeholder="0.00">
                </div>
            </div>

            <button type="submit" class="btn btn-success btn-lg w-100"
                    onclick="return validateArticle()">Einkauf buchen</button>
        </form>
    </div>
</div>

<script>
function validateArticle() {
    const code = document.getElementById('article_code').value;
    if (!code) {
        document.getElementById('article_search').classList.add('is-invalid');
        document.getElementById('article_search').focus();
        return false;
    }
    return true;
}

document.addEventListener('click', function(e) {
    const btn = e.target.closest('.article-pick-btn');
    if (btn) {
        document.getElementById('article_code').value = btn.dataset.code;
        document.getElementById('article_search').value = btn.dataset.name + ' (' + btn.dataset.code + ')';
        document.getElementById('article_search').classList.remove('is-invalid');
        document.getElementById('article-results').innerHTML = '';
        return;
    }
    if (!e.target.closest('#article-results') && e.target.id !== 'article_search') {
        const r = document.getElementById('article-results');
        if (r) r.innerHTML = '';
    }
});

document.getElementById('article_search').addEventListener('input', function() {
    document.getElementById('article_code').value = '';
});
</script>
{% endblock %}
