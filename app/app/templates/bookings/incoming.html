{% extends 'base.html' %}
{% block title %}Einkauf / Einlagerung – Lagerverwaltung{% endblock %}
{% block content %}
<div class="row">
    <div class="col-12 col-md-6">
        <h2 class="mb-1">Einkauf / Einlagerung</h2>
        <p class="text-muted mb-3">Ware wird ins Hauptlager eingebucht.</p>

        <form method="post">
            <div class="mb-3">
                <label for="article_code" class="form-label fw-semibold">Artikel *</label>
                <input type="text"
                       class="form-control form-control-lg"
                       id="article_code"
                       name="article_code"
                       list="article-datalist"
                       hx-get="{{ url_for('bookings.article_search') }}"
                       hx-target="#article-datalist"
                       hx-trigger="input changed delay:300ms"
                       autocomplete="off"
                       placeholder="Artikelcode eingeben…"
                       required>
                <datalist id="article-datalist">
                    {% for a in articles %}
                    <option value="{{ a.article_id }}">{{ a.name }}</option>
                    {% endfor %}
                </datalist>
            </div>

            <div class="mb-3">
                <label for="quantity" class="form-label fw-semibold">Menge *</label>
                <input type="number"
                       class="form-control form-control-lg"
                       id="quantity"
                       name="quantity"
                       min="0.0001"
                       step="any"
                       inputmode="decimal"
                       placeholder="0,00"
                       required>
            </div>

            <div class="mb-4">
                <label for="purchase_price" class="form-label fw-semibold">Einkaufspreis <span class="text-muted fw-normal">(optional)</span></label>
                <div class="input-group input-group-lg">
                    <input type="number"
                           class="form-control"
                           id="purchase_price"
                           name="purchase_price"
                           min="0"
                           step="any"
                           inputmode="decimal"
                           placeholder="0,00">
                    <span class="input-group-text">€</span>
                </div>
            </div>

            <button type="submit" class="btn btn-success btn-lg w-100">Einkauf buchen</button>
        </form>
    </div>
</div>
{% endblock %}
